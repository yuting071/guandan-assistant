name: Build Android APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    env:
      JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk-headless autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev \
          libltdl-dev libbz2-dev libreadline-dev libsqlite3-dev wget curl llvm \
          libncursesw5-dev xz-utils tk-dev libxml2-dev libxmlsec1-dev \
          liblzma-dev python3-dev python3-pip python3-setuptools
    
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip setuptools wheel
        pip install cython==0.29.36
        pip install buildozer==1.5.0
    
    - name: Build APK
      run: |
        echo "y" | buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: guandan-assistant-apk
        path: bin/*.apk
