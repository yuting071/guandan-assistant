name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk-headless build-essential libssl-dev libffi-dev autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
        pip install --upgrade pip setuptools wheel
        pip install cython==0.29.36
        pip install buildozer==1.5.0
    
    - name: Build APK
      run: |
        yes | buildozer android debug
      continue-on-error: true
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: guandan-assistant-apk
        path: bin/*.apk
